# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: mcp-functions-long-running-tools-python
metadata:
  template: mcp-functions-long-running-tools-python@1.0.0
services:
  api:
    project: ./src/
    language: python
    host: function

# When deploying, the function app uses the Durable Task Scheduler (DTS) backend, while local
# development uses the Azure Storage backend (Azurite). These hooks swap the DTS host.json
# (src/host.dts.json) in just for packaging, then restore the local Azure Storage host.json. The
# working tree is left unchanged after deploy.
hooks:
  prepackage:
    posix:
      shell: sh
      run: cp src/host.json src/host.json.bak && cp src/host.dts.json src/host.json
    windows:
      shell: pwsh
      run: Copy-Item src/host.json src/host.json.bak -Force; Copy-Item src/host.dts.json src/host.json -Force
  postpackage:
    posix:
      shell: sh
      run: mv src/host.json.bak src/host.json
    windows:
      shell: pwsh
      run: Move-Item src/host.json.bak src/host.json -Force
